# doc: https://docs.prow.k8s.io/docs/components/optional/branchprotector/
# https://github.com/cloudfoundry/community/blob/main/toc/rfc/rfc-0015-branch-protection.md
branch-protection:
  orgs:
    cloudfoundry:
      repos:
        # example repo configured as if the project would belong to ARD WG, area CF Deployment
        # automation would generate repo/branch config for all repos belonging to a WG unless an explicit configuration exists here
        branchprotection-test:
          protect: true
          enforce_admins: true
          allow_force_pushes: false
          allow_deletions: false
          allow_disabled_policies: true  # needed to allow branches w/o branch protection
          required_pull_request_reviews:
            dismiss_stale_reviews: true
            require_code_owner_reviews: true
            required_approving_review_count: 1 # area has >=4 approvers
            bypass_pull_request_allowances:
              teams: ["wg-app-runtime-deployments-bots"] # no area bots configured
          include: [ "^main$", "^v[0-9]*$"]
        cf-k8s-releases:
          allow_deletions: false
          allow_disabled_policies: true
          allow_force_pushes: false
          enforce_admins: true
          include: ["^main$"]
          protect: true
          required_status_checks:
            contexts:
              - "EasyCLA"
              - "binary-buildpack-verify"
              - "bosh-dns-verify"
              - "capi-verify"
              - "cf-networking-verify"
              - "cflinuxfs4-verify"
              - "credhub-verify"
              - "diego-verify"
              - "dotnet-core-buildpack-verify"
              - "go-buildpack-verify"
              - "java-buildpack-verify"
              - "log-cache-verify"
              - "loggregator-agent-verify"
              - "loggregator-verify"
              - "nfs-volume-verify"
              - "nginx-buildpack-verify"
              - "nodejs-buildpack-verify"
              - "php-buildpack-verify"
              - "python-buildpack-verify"
              - "r-buildpack-verify"
              - "routing-verify"
              - "ruby-buildpack-verify"
              - "staticfile-buildpack-verify"
              - "uaa-verify"
          required_pull_request_reviews:
            dismiss_stale_reviews: true
            require_code_owner_reviews: true
            required_approving_review_count: 1
